<!DOCTYPE html>
<html>
<head>
    <title>代码库助手</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; }
        #chat { border: 1px solid #ccc; height: 400px; overflow-y: auto; padding: 10px; background: #f9f9f9; }
        .user { text-align: right; color: #0066cc; margin: 8px; }
        .assistant { text-align: left; color: #2c3e50; margin: 8px; background: #e9ecef; padding: 8px; border-radius: 8px; }
        .loading { color: gray; font-style: italic; }
        input { width: 80%; padding: 8px; margin-top: 10px; }
        button { padding: 8px 16px; margin-left: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>代码库 RAG + ReAct Agent</h1>
    <div id="chat"></div>
    <input type="text" id="message" placeholder="输入问题..." />
    <button onclick="sendMessage()">发送</button>

    <script>
        let history = [];
        async function sendMessage() {
            const input = document.getElementById('message');
            const msg = input.value.trim();
            if (!msg) return;
            appendMessage('user', msg);
            input.value = '';
            appendMessage('assistant', '思考中...', true);
            
            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg, history: history })
                });
                const data = await response.json();
                // 移除“思考中...”占位
                const last = document.getElementById('chat').lastChild;
                if (last && last.classList && last.classList.contains('loading')) last.remove();
                appendMessage('assistant', data.answer);
                history.push({ role: 'user', content: msg });
                history.push({ role: 'assistant', content: data.answer });
                if (history.length > 20) history = history.slice(-20);
            } catch (err) {
                const last = document.getElementById('chat').lastChild;
                if (last && last.classList && last.classList.contains('loading')) last.remove();
                appendMessage('assistant', '错误：无法连接服务器。');
                console.error(err);
            }
        }
        function appendMessage(role, text, isLoading = false) {
            const chatDiv = document.getElementById('chat');
            const msgDiv = document.createElement('div');
            msgDiv.className = role + (isLoading ? ' loading' : '');
            msgDiv.innerText = (role === 'user' ? '我: ' : '助手: ') + text;
            if (isLoading) msgDiv.classList.add('loading');
            chatDiv.appendChild(msgDiv);
            chatDiv.scrollTop = chatDiv.scrollHeight;
        }
    </script>
</body>
</html>
